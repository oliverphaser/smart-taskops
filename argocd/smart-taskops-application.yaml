apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smart-taskops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/oliverphaser/smart-taskops.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: smart-taskops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
